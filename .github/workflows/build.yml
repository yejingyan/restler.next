name: Build APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temur'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Build APK
        run: |
          cd ${{ github.workspace }}
          chmod +x gradlew
          ./gradlew assemble${{ inputs.variant || 'debug' }} --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: restler-${{ inputs.variant || 'debug' }}-apk
          path: app/build/outputs/apk/${{ inputs.variant || 'debug' }}/*.apk
      
      - name: Download APK
        id: download
        uses: actions/download-artifact@v4
        with:
          name: restler-${{ inputs.variant || 'debug' }}-apk
          path: ./apk_output
      
      - name: Get APK info
        run: |
          echo "APK files:"
          ls -lh ./apk_output/
